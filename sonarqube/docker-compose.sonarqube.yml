version: "3.8"

# SonarQube conteneurisé, exécuté en local sur la machine hébergeant le
# runner GitHub Actions self-hosted (voir docs/architecture.md).
# Démarrage : docker compose -f sonarqube/docker-compose.sonarqube.yml up -d
# UI/API disponibles sur http://localhost:9000 (identifiants par défaut admin/admin
# à changer au premier lancement).

services:
  sonarqube:
    image: sonarqube:community
    container_name: tiwap-sonarqube
    depends_on:
      - sonarqube-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped

  sonarqube-db:
    image: postgres:15-alpine
    container_name: tiwap-sonarqube-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonarqube_db:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_db:
